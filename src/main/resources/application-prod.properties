# ===================== APP =====================
spring.application.name=Library-Management-System
server.port=${PORT:8080}

# ===================== DATABASE =====================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================== RAZORPAY =====================
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_SECRET}
razorpay.callback.base-url=${FRONTEND_URL}

# ===================== FRONTEND =====================
app.frontend.reset-url=${FRONTEND_URL}/auth/reset-password?token=

# ===================== EMAIL =====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

library.notification.from=${MAIL_USERNAME}
library.notification.enabled=true
library.notification.due-reminder-days=3

# ===================== DEVTOOLS =====================
spring.devtools.livereload.enabled=false

# ===================== AI =====================
gemini.api.key=${GEMINI_API_KEY}

# ===================== SUBSCRIPTION =====================
subscription.default.plan=MONTHLY
subscription.auto.renew.enabled=false
subscription.expiry.check.cron=0 0 2 * * ?

# ===================== SCHEDULER =====================
spring.task.scheduling.pool.size=5

# ===================== LOGGING =====================
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql=INFO

# ===================== GOOGLE OAUTH =====================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL}/login/oauth2/code/google

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub